<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筆算割り算ゲーム（履歴記録機能付き）</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        h2 { margin: 5px 0; font-size: 22px; }
        p { margin: 0 0 15px 0; font-size: 14px; color: #555; }

        /* 全体のコンテナ */
        .game-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 30px;
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 95%;
            margin-bottom: 20px;
        }

        /* 筆算の表示エリア */
        .math-grid {
            display: inline-grid;
            grid-template-columns: repeat(6, 45px);
            grid-template-rows: repeat(4, 50px);
            gap: 4px;
            font-size: 32px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            align-items: center;
            justify-items: center;
        }

        .blank {
            width: 40px;
            height: 45px;
            border: 2px solid #333;
            border-radius: 6px;
            text-align: center;
            line-height: 45px;
            background-color: #fffde7;
            cursor: pointer;
            box-sizing: border-box;
        }
        .blank.selected {
            border-color: #ff5722;
            background-color: #ffe0b2;
        }
        
        .grid-line-1 {
            grid-column: 2 / 6;
            grid-row: 3;
            width: 100%;
            border-bottom: 3px solid #333;
            align-self: start;
        }

        .right-side-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #result-message {
            font-size: 18px;
            font-weight: bold;
            height: 25px;
        }

        .controls-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 65px);
            gap: 8px;
        }
        .key {
            width: 65px;
            height: 60px;
            font-size: 22px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
        }
        .key:active { background: #1976D2; }
        .key.clear { background: #f44336; }
        
        .check-btn {
            width: 75px;
            height: 264px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 4px;
        }
        .check-btn:active { background-color: #388E3C; }

        .next-btn {
            display: none;
            margin-top: 10px;
            padding: 10px 35px;
            font-size: 18px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        /* 📊 ★履歴エリアのスタイル */
        .history-container {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 95%;
            box-sizing: border-box;
            margin-top: 10px;
        }
        .history-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clear-history-btn {
            background: #9e9e9e;
            color: white;
            border: none;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .history-table th, .history-table td {
            border-bottom: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        .history-table th {
            background-color: #f5f5f5;
            color: #666;
        }
        .status-ok { color: #4CAF50; font-weight: bold; }
        .status-ng { color: #f44336; font-weight: bold; }

        @media (max-width: 650px) {
            .game-container {
                flex-direction: column;
                padding: 15px;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <h2>筆算クイズ（3桁 ÷ 1桁）</h2>
    <p>頭の中で引き算をして、あまりの数を入れていこう！</p>

    <div class="game-container">
        <!-- 左側：筆算エリア -->
        <div class="math-grid" id="math-grid-screen"></div>

        <!-- 右側：操作エリア -->
        <div class="right-side-controls">
            <div id="result-message"></div>

            <div class="controls-container">
                <div class="keypad">
                    <button class="key" onclick="inputNum(1)">1</button>
                    <button class="key" onclick="inputNum(2)">2</button>
                    <button class="key" onclick="inputNum(3)">3</button>
                    <button class="key" onclick="inputNum(4)">4</button>
                    <button class="key" onclick="inputNum(5)">5</button>
                    <button class="key" onclick="inputNum(6)">6</button>
                    <button class="key" onclick="inputNum(7)">7</button>
                    <button class="key" onclick="inputNum(8)">8</button>
                    <button class="key" onclick="inputNum(9)">9</button>
                    <div style="width:65px;"></div> 
                    <button class="key" onclick="inputNum(0)">0</button>
                    <button class="key clear" onclick="clearBox()">消</button>
                </div>
                <button class="check-btn" onclick="checkAnswer()">答え合わせ</button>
            </div>

            <button id="next-button" class="next-btn" onclick="generateProblem()">つぎの問題へ 👉</button>
        </div>
    </div>

    <!-- 📊 ★履歴表示用のコンテナ -->
    <div class="history-container">
        <div class="history-title">
            <span>📊 最近のチャレンジれきし（10回分）</span>
            <button class="clear-history-btn" onclick="clearHistoryData()">れきしを消す</button>
        </div>
        <table class="history-table">
            <thead>
                <tr>
                    <th>日時</th>
                    <th>もんだい</th>
                    <th>せいご</th>
                </tr>
            </thead>
            <tbody id="history-log-body">
                <tr>
                    <td colspan="3" style="color:#aaa;">まだデータがありません。がんばって解いてみよう！</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const boxOrder = ['ans1', 'sub1', 'ans2', 'rem1'];
        let currentSelectedId = 'ans1';
        let correctValues = {};
        let currentProblemString = ""; // 履歴用に現在の問題を文字で保持する変数

        function generateProblem() {
            document.getElementById('result-message').innerText = '';
            document.getElementById('next-button').style.display = 'none';

            const divisor = Math.floor(Math.random() * 7) + 3; 
            const q_tens = Math.floor(Math.random() * 9) + 1;  
            const q_ones = Math.floor(Math.random() * 10);     
            const total_quotient = q_tens * 10 + q_ones;       

            const final_remainder = Math.floor(Math.random() * divisor); 
            const dividend = (divisor * total_quotient) + final_remainder;

            const d1 = Math.floor(dividend / 100);       
            if (d1 >= divisor) {
                generateProblem();
                return;
            }

            const d2 = Math.floor((dividend % 100) / 10); 
            const d3 = dividend % 10;                     

            // 履歴保存用のテキストを作っておく (例: "544 ÷ 8")
            currentProblemString = `${dividend} ÷ ${divisor}`;

            const upper_two_digits = d1 * 10 + d2;
            const mult1 = divisor * q_tens;
            const sub1_total = upper_two_digits - mult1;

            correctValues = {
                'ans1': q_tens,
                'ans2': q_ones,
                'sub1': sub1_total, 
                'rem1': final_remainder
            };

            const gridScreen = document.getElementById('math-grid-screen');
            gridScreen.innerHTML = `
                <div id="ans1" class="blank" style="grid-column:4; grid-row:1;" onclick="selectBox('ans1')"></div>
                <div id="ans2" class="blank" style="grid-column:5; grid-row:1;" onclick="selectBox('ans2')"></div>
                
                <div style="grid-column:1; grid-row:2; justify-self:end;">${divisor}</div>
                <div style="grid-column:2; grid-row:2; border-top:2px solid #333; border-left:2px solid #333; border-top-left-radius:8px; height:100%; width:100%; box-sizing:border-box; margin-top:16px;"></div>
                <div style="grid-column:3; grid-row:2; border-top:2px solid #333; padding-top:4px; width:100%; text-align:center;">${d1}</div>
                <div style="grid-column:4; grid-row:2; border-top:2px solid #333; padding-top:4px; width:100%; text-align:center;">${d2}</div>
                <div style="grid-column:5; grid-row:2; border-top:2px solid #333; padding-top:4px; width:100%; text-align:center;">${d3}</div>

                <div id="sub1" class="blank" style="grid-column:4; grid-row:3;" onclick="selectBox('sub1')"></div>
                <div style="grid-column:5; grid-row:3;">${d3}</div>

                <div class="grid-line-1"></div>
                <div id="rem1" class="blank" style="grid-column:5; grid-row:4; align-self:end;" onclick="selectBox('rem1')"></div>
            `;

            currentSelectedId = 'ans1';
            document.getElementById('ans1').classList.add('selected');
        }

        function selectBox(id) {
            const currentBox = document.getElementById(currentSelectedId);
            if(currentBox) currentBox.classList.remove('selected');
            currentSelectedId = id;
            const newBox = document.getElementById(currentSelectedId);
            if(newBox) newBox.classList.add('selected');
        }

        function inputNum(num) {
            const targetBox = document.getElementById(currentSelectedId);
            if(!targetBox) return;
            targetBox.innerText = num;

            const currentIndex = boxOrder.indexOf(currentSelectedId);
            if (currentIndex < boxOrder.length - 1) {
                const nextBoxId = boxOrder[currentIndex + 1];
                selectBox(nextBoxId);
            }
        }

        function clearBox() {
            const targetBox = document.getElementById(currentSelectedId);
            if(!targetBox) return;
            targetBox.innerText = '';
            
            const currentIndex = boxOrder.indexOf(currentSelectedId);
            if (currentIndex > 0) {
                const prevBoxId = boxOrder[currentIndex - 1];
                selectBox(prevBoxId);
            }
        }

        function checkAnswer() {
            const messageArea = document.getElementById('result-message');
            
            const ans1_user = parseInt(document.getElementById('ans1').innerText) || 0;
            const ans2_user = parseInt(document.getElementById('ans2').innerText) || 0;
            const sub1_user = parseInt(document.getElementById('sub1').innerText) || 0;
            const rem1_user = parseInt(document.getElementById('rem1').innerText) || 0;

            let isCorrect = false;

            if (
                ans1_user === correctValues.ans1 &&
                ans2_user === correctValues.ans2 &&
                sub1_user === correctValues.sub1 &&
                rem1_user === correctValues.rem1
            ) {
                messageArea.style.color = '#4CAF50';
                messageArea.innerText = '正解！🎉 カンペキです！';
                document.getElementById('next-button').style.display = 'block';
                isCorrect = true;
            } else {
                messageArea.style.color = '#f44336';
                messageArea.innerText = 'おや？もう一度考えてみよう🤔';
                isCorrect = false;
            }

            // ★【追加】答え合わせボタンが押されたので履歴に記録する
            saveHistory(currentProblemString, isCorrect);
        }

        // ★【追加】履歴をLocalStorageに保存し、画面を更新する関数
        function saveHistory(problem, isCorrect) {
            // 現在の日時を取得してフォーマット (例: "06/14 21:15")
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const timeString = `${month}/${date} ${hours}:${minutes}`;

            // 既存の履歴を取り出す（無ければ空の配列）
            let historyData = JSON.parse(localStorage.getItem('math_game_history')) || [];

            // 新しい記録のオブジェクトを作成
            const newLog = {
                time: timeString,
                problem: problem,
                result: isCorrect ? '〇 せいかい' : '× おや？'
            };

            // 配列の「最初（先頭）」に新しい記録を追加
            historyData.unshift(newLog);

            // 履歴がどんどん増えすぎないよう、最新の20回分だけ残す
            if (historyData.length > 20) {
                historyData = historyData.slice(0, 20);
            }

            // ローカルストレージにしっかり保存
            localStorage.setItem('math_game_history', JSON.stringify(historyData));

            // 画面の下部テーブルに反映
            updateHistoryTable();
        }

        // ★【追加】ローカルストレージからデータを読み込んでテーブルを書き換える関数
        function updateHistoryTable() {
            const historyData = JSON.parse(localStorage.getItem('math_game_history')) || [];
            const tableBody = document.getElementById('history-log-body');

            if (historyData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3" style="color:#aaa;">まだデータがありません。がんばって解いてみよう！</td></tr>`;
                return;
            }

            let html = '';
            historyData.forEach(log => {
                const resultClass = log.result.includes('せいかい') ? 'status-ok' : 'status-ng';
                html += `
                    <tr>
                        <td style="color:#666;">${log.time}</td>
                        <td style="font-weight:bold;">${log.problem}</td>
                        <td class="${resultClass}">${log.result}</td>
                    </tr>
                `;
            });
            tableBody.innerHTML = html;
        }

        // ★【追加】履歴データをリセットする関数
        function clearHistoryData() {
            if (confirm('これまでのがんばった「れきし」をクリアしますか？')) {
                localStorage.removeItem('math_game_history');
                updateHistoryTable();
            }
        }

        // 起動時に問題を生成し、保存されている履歴があれば読み込む
        window.onload = function() {
            generateProblem();
            updateHistoryTable();
        };
    </script>

</body>
</html>
