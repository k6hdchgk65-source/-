<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筆算割り算ゲーム（ボタン位置修正版）</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        h2 { margin: 5px 0; font-size: 22px; }
        p { margin: 0 0 15px 0; font-size: 14px; color: #555; }

        /* 全体のコンテナ（iPad横向きなどの広い画面用） */
        .game-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 30px;
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 95%;
        }

        /* 筆算の表示エリア */
        .math-grid {
            display: inline-grid;
            grid-template-columns: repeat(6, 45px);
            grid-template-rows: repeat(4, 50px);
            gap: 4px;
            font-size: 32px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            align-items: center;
            justify-items: center;
        }

        /* 空欄（入力ボックス）のスタイル */
        .blank {
            width: 40px;
            height: 45px;
            border: 2px solid #333;
            border-radius: 6px;
            text-align: center;
            line-height: 45px;
            background-color: #fffde7;
            cursor: pointer;
            box-sizing: border-box;
        }
        .blank.selected {
            border-color: #ff5722;
            background-color: #ffe0b2;
        }
        
        /* 筆算の横線 */
        .grid-line-1 {
            grid-column: 2 / 6;
            grid-row: 3;
            width: 100%;
            border-bottom: 3px solid #333;
            align-self: start;
        }

        /* 右側（または下側）の操作エリア */
        .right-side-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* 結果表示エリア */
        #result-message {
            font-size: 18px;
            font-weight: bold;
            height: 25px;
        }

        /* ★キーパッドと答え合わせボタンを「常に横並び」にするコンテナ */
        .controls-container {
            display: flex;
            flex-direction: row; /* 常に横並びを強制 */
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 65px);
            gap: 8px;
        }
        .key {
            width: 65px;
            height: 60px;
            font-size: 22px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
        }
        .key:active { background: #1976D2; }
        .key.clear { background: #f44336; }
        
        /* ★答え合わせボタン：縦・横どちらでもキーパッドの右に綺麗に収まる高さに調整 */
        .check-btn {
            width: 75px;
            height: 264px; /* キーパッド全体の高さ（60px * 4行 + 隙間）にジャストフィット */
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 4px;
        }
        .check-btn:active { background-color: #388E3C; }

        .next-btn {
            display: none;
            margin-top: 10px;
            padding: 10px 35px;
            font-size: 18px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        /* 📱 画面の幅が狭い時（縦向きスマホなど）のレスポンシブ対応 */
        @media (max-width: 650px) {
            .game-container {
                flex-direction: column; /* 筆算と操作エリアは上下に並べる */
                padding: 15px;
                gap: 15px;
            }
            /* 縦画面でも、キーパッドと答え合わせボタンの横並び関係は壊れません */
        }
    </style>
</head>
<body>

    <h2>筆算クイズ（3桁 ÷ 1桁）</h2>
    <p>頭の中で引き算をして、あまりの数を入れていこう！</p>

    <div class="game-container">
        
        <div class="math-grid" id="math-grid-screen"></div>

        <div class="right-side-controls">
            <div id="result-message"></div>

            <div class="controls-container">
                <div class="keypad">
                    <button class="key" onclick="inputNum(1)">1</button>
                    <button class="key" onclick="inputNum(2)">2</button>
                    <button class="key" onclick="inputNum(3)">3</button>
                    <button class="key" onclick="inputNum(4)">4</button>
                    <button class="key" onclick="inputNum(5)">5</button>
                    <button class="key" onclick="inputNum(6)">6</button>
                    <button class="key" onclick="inputNum(7)">7</button>
                    <button class="key" onclick="inputNum(8)">8</button>
                    <button class="key" onclick="inputNum(9)">9</button>
                    <div style="width:65px;"></div> 
                    <button class="key" onclick="inputNum(0)">0</button>
                    <button class="key clear" onclick="clearBox()">消</button>
                </div>
                <button class="check-btn" onclick="checkAnswer()">答え合わせ</button>
            </div>

            <button id="next-button" class="next-btn" onclick="generateProblem()">つぎの問題へ 👉</button>
        </div>

    </div>

    <script>
        const boxOrder = ['ans1', 'ans2', 'sub1', 'rem1'];
        let currentSelectedId = 'ans1';
        let correctValues = {};

        function generateProblem() {
            document.getElementById('result-message').innerText = '';
            document.getElementById('next-button').style.display = 'none';

            const divisor = Math.floor(Math.random() * 7) + 3; 
            const q_tens = Math.floor(Math.random() * 9) + 1;  
            const q_ones = Math.floor(Math.random() * 10);     
            const total_quotient = q_tens * 10 + q_ones;       

            const final_remainder = Math.floor(Math.random() * divisor); 
            const dividend = (divisor * total_quotient) + final_remainder;

            const d1 = Math.floor(dividend / 100);       
            if (d1 >= divisor) {
                generateProblem();
                return;
            }

            const d2 = Math.floor((dividend % 100) / 10); 
            const d3 = dividend % 10;                     

            const upper_two_digits = d1 * 10 + d2;
            const mult1 = divisor * q_tens;
            const sub1_total = upper_two_digits - mult1;

            correctValues = {
                'ans1': q_tens,
                'ans2': q_ones,
                'sub1': sub1_total, 
                'rem1': final_remainder
            };

            const gridScreen = document.getElementById('math-grid-screen');
            gridScreen.innerHTML = `
                <div id="ans1" class="blank" style="grid-column:4; grid-row:1;" onclick="selectBox('ans1')"></div>
                <div id="ans2" class="blank" style="grid-column:5; grid-row:1;" onclick="selectBox('ans2')"></div>
                
                <div style="grid-column:1; grid-row:2; justify-self:end;">${divisor}</div>
                <div style="grid-column:2; grid-row:2; border-top:2px solid #333; border-left:2px solid #333; border-top-left-radius:8px; height:100%; width:100%; box-sizing:border-box; margin-top:16px;"></div>
                <div style="grid-column:3; grid-row:2; border-top:2px solid #333; padding-top:4px; width:100%; text-align:center;">${d1}</div>
                <div style="grid-column:4; grid-row:2; border-top:2px solid #333; padding-top:4px; width:100%; text-align:center;">${d2}</div>
                <div style="grid-column:5; grid-row:2; border-top:2px solid #333; padding-top:4px; width:100%; text-align:center;">${d3}</div>

                <div id="sub1" class="blank" style="grid-column:4; grid-row:3;" onclick="selectBox('sub1')"></div>
                <div style="grid-column:5; grid-row:3;">${d3}</div>

                <div class="grid-line-1"></div>
                <div id="rem1" class="blank" style="grid-column:5; grid-row:4; align-self:end;" onclick="selectBox('rem1')"></div>
            `;

            currentSelectedId = 'ans1';
            document.getElementById('ans1').classList.add('selected');
        }

        function selectBox(id) {
            const currentBox = document.getElementById(currentSelectedId);
            if(currentBox) currentBox.classList.remove('selected');
            currentSelectedId = id;
            const newBox = document.getElementById(currentSelectedId);
            if(newBox) newBox.classList.add('selected');
        }

        function inputNum(num) {
            const targetBox = document.getElementById(currentSelectedId);
            if(!targetBox) return;
            targetBox.innerText = num;

            const currentIndex = boxOrder.indexOf(currentSelectedId);
            if (currentIndex < boxOrder.length - 1) {
                const nextBoxId = boxOrder[currentIndex + 1];
                selectBox(nextBoxId);
            }
        }

        function clearBox() {
            const targetBox = document.getElementById(currentSelectedId);
            if(!targetBox) return;
            targetBox.innerText = '';
            
            const currentIndex = boxOrder.indexOf(currentSelectedId);
            if (currentIndex > 0) {
                const prevBoxId = boxOrder[currentIndex - 1];
                selectBox(prevBoxId);
            }
        }

        function checkAnswer() {
            const messageArea = document.getElementById('result-message');
            
            const ans1_user = parseInt(document.getElementById('ans1').innerText) || 0;
            const ans2_user = parseInt(document.getElementById('ans2').innerText) || 0;
            const sub1_user = parseInt(document.getElementById('sub1').innerText) || 0;
            const rem1_user = parseInt(document.getElementById('rem1').innerText) || 0;

            if (
                ans1_user === correctValues.ans1 &&
                ans2_user === correctValues.ans2 &&
                sub1_user === correctValues.sub1 &&
                rem1_user === correctValues.rem1
            ) {
                messageArea.style.color = '#4CAF50';
                messageArea.innerText = '正解！🎉 カンペキです！';
                document.getElementById('next-button').style.display = 'block';
            } else {
                messageArea.style.color = '#f44336';
                messageArea.innerText = 'おや？もう一度考えてみよう🤔';
            }
        }

        window.onload = generateProblem;
    </script>

</body>
</html>
