<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1けたの たしざんクイズ（履歴つき）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #eef5fb;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }
        .quiz-container {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 340px;
            margin-bottom: 20px;
        }
        /* 問題表示エリア */
        .question-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 40px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        /* 1桁ごとの四角い入力欄 */
        .answer-boxes {
            display: flex;
            gap: 8px;
        }
        .box {
            width: 45px;
            height: 55px;
            border: 3px solid #4a90e2;
            border-radius: 8px;
            font-size: 36px;
            font-weight: bold;
            line-height: 55px;
            text-align: center;
            background-color: #f7faff;
        }
        /* テンキーエリア */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .key-btn {
            font-size: 24px;
            font-weight: bold;
            padding: 15px 0;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 3px 0 #ccc;
        }
        .key-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .clear-btn {
            background-color: #ffcccb;
            border-color: #ff9999;
            box-shadow: 0 3px 0 #ff9999;
        }
        /* アクションボタン */
        .action-btn {
            width: 100%;
            font-size: 22px;
            font-weight: bold;
            padding: 12px 0;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #submit-btn {
            background-color: #4caf50;
            box-shadow: 0 4px 0 #388e3c;
        }
        #submit-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        #next-btn {
            background-color: #ff9800;
            box-shadow: 0 4px 0 #f57c00;
            display: none;
        }
        #next-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        /* 結果表示 */
        .result {
            font-size: 26px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 38px;
        }
        .correct { color: #ff5722; }
        .incorrect { color: #2196f3; }

        /* 履歴表示エリア */
        .history-container {
            background-color: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            width: 350px;
            max-height: 300px;
            overflow-y: auto; /* 20件並んだらスクロールできるようにする */
        }
        .history-title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 10px;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clear-history-link {
            font-size: 12px;
            color: #999;
            cursor: pointer;
            text-decoration: underline;
        }
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .history-date {
            color: #888;
        }
        .history-q {
            font-weight: bold;
            color: #333;
        }
        .history-status.ok {
            color: #ff5722;
            font-weight: bold;
        }
        .history-status.ng {
            color: #2196f3;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="question-row">
        <span id="question">? + ?</span>
        <span>＝</span>
        <div class="answer-boxes">
            <div class="box" id="tens-box"></div>
            <div class="box" id="ones-box"></div>
        </div>
    </div>

    <div class="keypad">
        <button class="key-btn" onclick="pressNum(1)">1</button>
        <button class="key-btn" onclick="pressNum(2)">2</button>
        <button class="key-btn" onclick="pressNum(3)">3</button>
        <button class="key-btn" onclick="pressNum(4)">4</button>
        <button class="key-btn" onclick="pressNum(5)">5</button>
        <button class="key-btn" onclick="pressNum(6)">6</button>
        <button class="key-btn" onclick="pressNum(7)">7</button>
        <button class="key-btn" onclick="pressNum(8)">8</button>
        <button class="key-btn" onclick="pressNum(9)">9</button>
        <button class="key-btn clear-btn" onclick="pressClear()">けす</button>
        <button class="key-btn" onclick="pressNum(0)">0</button>
        <div></div>
    </div>

    <button id="submit-btn" class="action-btn" onclick="checkAnswer()">こたえあわせ</button>
    <button id="next-btn" class="action-btn" onclick="nextQuestion()">つぎの問題</button>

    <div class="result" id="result"></div>
</div>

<div class="history-container">
    <div class="history-title">
        <span>さいきんのきろく (最大20件)</span>
        <span class="clear-history-link" onclick="clearHistory()">きろくを消す</span>
    </div>
    <ul class="history-list" id="history-list">
        </ul>
</div>

<script>
    let num1 = 0;
    let num2 = 0;
    let correctAnswer = 0;
    let currentInput = "";

    window.onload = function() {
        nextQuestion();
        displayHistory(); // 起動時に保存されている履歴を表示
    };

    function nextQuestion() {
        num1 = Math.floor(Math.random() * 9) + 1;
        num2 = Math.floor(Math.random() * 9) + 1;
        correctAnswer = num1 + num2;

        document.getElementById("question").textContent = `${num1} + ${num2}`;
        
        currentInput = "";
        updateBoxes();
        document.getElementById("result").textContent = "";
        
        document.getElementById("submit-btn").style.display = "block";
        document.getElementById("next-btn").style.display = "none";
    }

    function pressNum(num) {
        if (document.getElementById("next-btn").style.display === "block") return;
        if (currentInput.length < 2) {
            currentInput += num;
            updateBoxes();
        }
    }

    function pressClear() {
        if (document.getElementById("next-btn").style.display === "block") return;
        currentInput = currentInput.slice(0, -1);
        updateBoxes();
    }

    function updateBoxes() {
        const tensBox = document.getElementById("tens-box");
        const onesBox = document.getElementById("ones-box");

        if (currentInput.length === 0) {
            tensBox.textContent = "";
            onesBox.textContent = "";
        } else if (currentInput.length === 1) {
            tensBox.textContent = "";
            onesBox.textContent = currentInput;
        } else if (currentInput.length === 2) {
            tensBox.textContent = currentInput[0];
            onesBox.textContent = currentInput[1];
        }
    }

    // 答え合わせと履歴の保存
    function checkAnswer() {
        if (currentInput === "") {
            alert("すうじを いれてね！");
            return;
        }

        const userAnswer = parseInt(currentInput, 10);
        const resultDiv = document.getElementById("result");
        let isCorrect = false;

        if (userAnswer === correctAnswer) {
            resultDiv.textContent = "○ せいかい！";
            resultDiv.className = "result correct";
            isCorrect = true;
        } else {
            resultDiv.textContent = `× ざんねん！ 正解は ${correctAnswer}`;
            resultDiv.className = "result incorrect";
            isCorrect = false;
        }

        // 履歴を保存する関数を呼び出す
        saveRecord(`${num1}+${num2}`, userAnswer, isCorrect);

        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "block";
    }

    // データをローカルストレージに保存する関数
    function saveRecord(questionText, userAnswer, isCorrect) {
        // 現在の日付と時刻を取得 (例: "06/15 14:30")
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const timeString = `${month}/${date} ${hours}:${minutes}`;

        // 今回のデータをオブジェクトにする
        const newRecord = {
            time: timeString,
            question: questionText,
            answer: userAnswer,
            status: isCorrect ? "○" : "×"
        };

        // すでに保存されている履歴を読み出す（ない場合は空の配列）
        let history = JSON.parse(localStorage.getItem("quiz_history")) || [];

        // 新しい履歴を配列の「先頭」に追加（最新が上に来るように）
        history.unshift(newRecord);

        // 20件を超えたら古いものを消す
        if (history.length > 20) {
            history = history.slice(0, 20);
        }

        // ローカルストレージに再保存
        localStorage.setItem("quiz_history", JSON.stringify(history));

        // 画面の履歴一覧を更新
        displayHistory();
    }

    // 保存された履歴を画面に表示する関数
    function displayHistory() {
        const historyList = document.getElementById("history-list");
        historyList.innerHTML = ""; // 一旦リストを空にする

        const history = JSON.parse(localStorage.getItem("quiz_history")) || [];

        if (history.length === 0) {
            historyList.innerHTML = `<li class="history-item" style="color:#aaa; justify-content:center;">まだデータがありません</li>`;
            return;
        }

        // 配列をループしてHTMLを組み立てる
        history.forEach(item => {
            const li = document.createElement("li");
            li.className = "history-item";

            // 正誤によって色を変えるためのクラス設定
            const statusClass = item.status === "○" ? "history-status ok" : "history-status ng";

            li.innerHTML = `
                <span class="history-date">${item.time}</span>
                <span class="history-q">${item.question}=${item.answer}</span>
                <span class="${statusClass}">${item.status}</span>
            `;
            historyList.appendChild(li);
        });
    }

    // 履歴をすべて削除する関数
    function clearHistory() {
        if (confirm("これまでのきろくを すべて消してもいいですか？")) {
            localStorage.removeItem("quiz_history");
            displayHistory();
        }
    }
</script>

</body>
</html>
